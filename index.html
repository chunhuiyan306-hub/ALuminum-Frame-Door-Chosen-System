<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gainer 铝框门 SKU 精准配置系统</title>
    <style>
        :root { --primary: #1a252f; --accent: #e67e22; --bg: #ecf0f1; --card: #ffffff; --border: #bdc3c7; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); margin: 0; display: flex; height: 100vh; color: #333; }
        
        /* 布局规划 */
        .left-panel { width: 55%; background: var(--card); padding: 30px; overflow-y: auto; border-right: 1px solid var(--border); box-shadow: 2px 0 15px rgba(0,0,0,0.05); }
        .right-panel { width: 45%; background: #2c3e50; color: #ecf0f1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; }
        
        h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--accent); padding-bottom: 10px; display: inline-block;}
        .right-panel h2 { color: #fff; border-bottom: 2px solid var(--accent); }
        
        /* 表单与步骤容器 */
        .step-box { background: #f8f9fa; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; transition: 0.3s; }
        .step-box.disabled { opacity: 0.4; pointer-events: none; filter: grayscale(100%); }
        .step-title { font-weight: bold; font-size: 16px; margin-bottom: 15px; color: var(--primary); }
        
        select, input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; margin-bottom: 10px; }
        
        /* 互斥单选按钮 (Radio Buttons) 的美化 */
        .radio-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .radio-group label { background: #fff; border: 1px solid var(--border); padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; transition: 0.2s; flex: 1; text-align: center; }
        .radio-group input[type="radio"] { display: none; }
        .radio-group input[type="radio"]:checked + label { background: var(--accent); color: white; border-color: var(--accent); font-weight: bold; }

        /* 动态参数区 (隐藏与显示) */
        .dynamic-section { background: #fff; padding: 15px; border-radius: 5px; border: 1px dashed var(--accent); margin-top: 10px; display: none; }
        .dynamic-section.active { display: block; animation: fadeIn 0.3s ease-in; }
        
        /* 按钮 */
        .btn-generate { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; margin-top: 20px;}
        .btn-generate:hover { background: #34495e; }
        
        /* 右侧清单样式 */
        .cart-item { background: #34495e; border-left: 5px solid var(--accent); padding: 15px; margin-bottom: 15px; border-radius: 4px; position: relative; }
        .cart-item .sku-code { font-family: 'Consolas', monospace; font-size: 18px; color: #f1c40f; margin-bottom: 8px; font-weight: bold; word-break: break-all;}
        .cart-item .sku-desc { font-size: 14px; color: #bdc3c7; line-height: 1.5; }
        .btn-delete { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .btn-delete:hover { background: #c0392b; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="left-panel">
        <h2>🛠️ Gainer 产品配置与 SKU 生成</h2>
        <p style="color: #7f8c8d; font-size: 14px; margin-bottom: 25px;">请严格按照步骤选择，系统将自动过滤不匹配的选项并生成精准 SKU。</p>

        <div class="step-box" id="step1">
            <div class="step-title">1. 选择框架型号</div>
            <select id="sel_frame" onchange="unlockStep2()">
                <option value="">-- 请选择 --</option>
                <option value="GM090">GM090 (极窄门)</option>
                <option value="GM004">GM004 (极简门)</option>
            </select>
        </div>

        <div class="step-box disabled" id="step2">
            <div class="step-title">2. 选择表面工艺与颜色</div>
            <div class="radio-group" onchange="updateColors()">
                <input type="radio" id="f_ano" name="finish_type" value="anodized"><label for="f_ano">氧化</label>
                <input type="radio" id="f_ps" name="finish_type" value="powder_skin"><label for="f_ps">喷油 (肤感)</label>
                <input type="radio" id="f_pm" name="finish_type" value="powder_metal"><label for="f_pm">喷油 (金属)</label>
            </div>
            <select id="sel_color" disabled onchange="unlockStep4()">
                <option value="">-- 请先选择上方工艺 --</option>
            </select>
        </div>

        <div class="step-box disabled" id="step4">
            <div class="step-title">3. 选择门芯填充物大类</div>
            <div class="radio-group" onchange="showInfillDetails()">
                <input type="radio" id="i_glass" name="infill_type" value="glass"><label for="i_glass">玻璃</label>
                <input type="radio" id="i_wood" name="infill_type" value="wood"><label for="i_wood">木板</label>
                <input type="radio" id="i_leather" name="infill_type" value="leather"><label for="i_leather">皮革</label>
                <input type="radio" id="i_rock" name="infill_type" value="rock"><label for="i_rock">岩板</label>
            </div>

            <div id="panel_glass" class="dynamic-section">
                <label>选择玻璃类型 (含工艺编号)：</label>
                <select id="glass_type" onchange="updateGlassThickness()">
                    <option value="">-- 选择玻璃 --</option>
                    <option value="G01|NONE|3,4,5,8">超白玻璃 [编号:G01] (无特殊工艺)</option>
                    <option value="G02|P0102|4+4,5+5">超白单面玉砂夹胶 [编号:G02] [工艺:P0102]</option>
                </select>
                <label style="margin-top:10px; display:block;">选择厚度：</label>
                <select id="glass_thick" disabled><option value="">-- 请先选择玻璃 --</option></select>
                <label style="margin-top:10px; display:block;">是否需要丝印？</label>
                <select id="glass_silk">
                    <option value="N">否 (No)</option>
                    <option value="Y">是 (Yes)</option>
                </select>
            </div>

            <div id="panel_wood" class="dynamic-section">
                <label>选择木板颜色：</label>
                <select id="wood_type">
                    <option value="O7AR">O7AR</option>
                    <option value="FA84">FA84</option>
                </select>
                <label style="margin-top:10px; display:block;">选择木板厚度：</label>
                <select id="wood_thick">
                    <option value="8mm">8mm</option>
                    <option value="18mm">18mm</option>
                    <option value="25mm">25mm</option>
                </select>
            </div>

            <div id="panel_leather" class="dynamic-section">
                <label>选择皮号：</label>
                <select id="leather_type">
                    <option value="H64144">H64144</option>
                    <option value="H64151">H64151</option>
                </select>
                <label style="margin-top:10px; display:block;">皮革厚度 (默认)：</label>
                <input type="text" id="leather_thick" value="1mm" disabled>
            </div>

            <div id="panel_rock" class="dynamic-section">
                <label>选择岩板花色：</label>
                <select id="rock_type">
                    <option value="Silk_blanco">丝绸白色 (Silk_blanco)</option>
                    <option value="Amaranto_natural">咖啡红 (Amaranto_natural)</option>
                </select>
                <label style="margin-top:10px; display:block;">选择岩板厚度：</label>
                <select id="rock_thick">
                    <option value="4mm">4mm</option>
                    <option value="6mm">6mm</option>
                </select>
            </div>
        </div>

        <button class="btn-generate" onclick="generateSKU()">➕ 生成专属 SKU 并加入清单</button>
    </div>

    <div class="right-panel">
        <h2>📋 客户意向/报价配置清单</h2>
        <p style="font-size: 13px; color: #95a5a6; margin-bottom: 20px;">这里显示已生成的严密逻辑 SKU，供直接复制给财务报价或工厂排单。</p>
        
        <div id="cart_container">
            <p id="empty_cart" style="color: #7f8c8d; text-align: center; margin-top: 50px;">清单空空如也。请在左侧配置。</p>
        </div>
    </div>

<script>
    // 简化的颜色数据库 (带编号)
    const colorDB = {
        "anodized": [ {name: "喷细砂亚黑", code: "YPF01"}, {name: "喷细砂银白", code: "YPC03"} ],
        "powder_skin": [ {name: "极光白", code: "PAE06"}, {name: "埃及米", code: "PAM02"} ],
        "powder_metal": [ {name: "高光白", code: "PAE02"}, {name: "轻奢金", code: "PAB09"} ]
    };

    let cartList = [];

    function unlockStep2() {
        if(document.getElementById('sel_frame').value !== "") {
            document.getElementById('step2').classList.remove('disabled');
        }
    }

    function updateColors() {
        const type = document.querySelector('input[name="finish_type"]:checked').value;
        const colorSel = document.getElementById('sel_color');
        colorSel.innerHTML = '<option value="">-- 请选择具体颜色 --</option>';
        colorSel.disabled = false;
        
        colorDB[type].forEach(c => {
            let opt = document.createElement('option');
            opt.value = `${c.name}|${c.code}`; // 把名称和编号组合传递
            opt.innerHTML = `${c.name} [编号: ${c.code}]`;
            colorSel.appendChild(opt);
        });
    }

    function unlockStep4() {
        if(document.getElementById('sel_color').value !== "") {
            document.getElementById('step4').classList.remove('disabled');
        }
    }

    // 处理门芯材料的互斥显示
    function showInfillDetails() {
        const panels = ['panel_glass', 'panel_wood', 'panel_leather', 'panel_rock'];
        panels.forEach(p => document.getElementById(p).classList.remove('active'));
        
        const type = document.querySelector('input[name="infill_type"]:checked').value;
        document.getElementById(`panel_${type}`).classList.add('active');
    }

    // 动态处理玻璃的厚度联动
    function updateGlassThickness() {
        const glassVal = document.getElementById('glass_type').value; // 格式: G02|P0102|4+4,5+5
        const thickSel = document.getElementById('glass_thick');
        thickSel.innerHTML = '<option value="">-- 请选择厚度 --</option>';
        
        if(glassVal !== "") {
            thickSel.disabled = false;
            let thickOptions = glassVal.split('|')[2].split(','); // 提取厚度数组
            thickOptions.forEach(t => {
                let opt = document.createElement('option');
                opt.value = t + "mm"; opt.innerHTML = t + "mm";
                thickSel.appendChild(opt);
            });
        } else { thickSel.disabled = true; }
    }

    // 核心：生成并渲染 SKU
    function generateSKU() {
        // 1. 获取框架与颜色数据
        const frame = document.getElementById('sel_frame').value;
        if(!frame) { alert("请选择框架！"); return; }
        
        const finishRadio = document.querySelector('input[name="finish_type"]:checked');
        if(!finishRadio) { alert("请选择表面工艺！"); return; }
        const colorVal = document.getElementById('sel_color').value;
        if(!colorVal) { alert("请选择具体颜色！"); return; }
        
        const c_name = colorVal.split('|')[0];
        const c_code = colorVal.split('|')[1];

        // 2. 获取互斥的门芯数据
        const infillRadio = document.querySelector('input[name="infill_type"]:checked');
        if(!infillRadio) { alert("请选择门芯填充物大类！"); return; }
        const infillType = infillRadio.value;
        
        let infillDesc = "";
        let infillSKUPart = "";

        if(infillType === 'glass') {
            const g_val = document.getElementById('glass_type').value;
            const g_thick = document.getElementById('glass_thick').value;
            const g_silk = document.getElementById('glass_silk').value;
            if(!g_val || !g_thick) { alert("请完善玻璃规格！"); return; }
            
            const g_code = g_val.split('|')[0];
            const g_process = g_val.split('|')[1]; // P0102 或 NONE
            
            infillDesc = `玻璃：${g_code} / 厚度:${g_thick} / 工艺编号:${g_process} / 丝印:${g_silk==='Y'?'是':'否'}`;
            infillSKUPart = `${g_code}-${g_process}-${g_thick}-Silk${g_silk}`;
        } 
        else if(infillType === 'wood') {
            const w_code = document.getElementById('wood_type').value;
            const w_thick = document.getElementById('wood_thick').value;
            infillDesc = `木板：编号 ${w_code} / 厚度:${w_thick}`;
            infillSKUPart = `WD-${w_code}-${w_thick}`;
        }
        else if(infillType === 'leather') {
            const l_code = document.getElementById('leather_type').value;
            infillDesc = `皮革：编号 ${l_code} / 厚度:1mm`;
            infillSKUPart = `LT-${l_code}-1mm`;
        }
        else if(infillType === 'rock') {
            const r_code = document.getElementById('rock_type').value;
            const r_thick = document.getElementById('rock_thick').value;
            infillDesc = `岩板：编号 ${r_code} / 厚度:${r_thick}`;
            infillSKUPart = `RK-${r_code}-${r_thick}`;
        }

        // 3. 拼接最终 SKU (格式：框架-颜色编号-填充物全属性)
        const finalSKU = `${frame}-${c_code}-${infillSKUPart}`;
        const finalDesc = `框架：${frame} | 颜色：${c_name} | ${infillDesc}`;

        // 加入数组并渲染
        cartList.push({ sku: finalSKU, desc: finalDesc, id: Date.now() });
        renderCart();
        
        // 可选：重置表单方便下一次录入
        // document.getElementById('sel_frame').value = "";
        // document.getElementById('step2').classList.add('disabled');
        // document.getElementById('step4').classList.add('disabled');
    }

    // 渲染右侧清单
    function renderCart() {
        const container = document.getElementById('cart_container');
        if(cartList.length === 0) {
            container.innerHTML = '<p id="empty_cart" style="color: #7f8c8d; text-align: center; margin-top: 50px;">清单空空如也。请在左侧配置。</p>';
            return;
        }

        let html = '';
        cartList.forEach(item => {
            html += `
                <div class="cart-item">
                    <button class="btn-delete" onclick="deleteItem(${item.id})">❌ 删除/回撤</button>
                    <div class="sku-code">${item.sku}</div>
                    <div class="sku-desc">${item.desc}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // 删除单条数据
    function deleteItem(id) {
        cartList = cartList.filter(item => item.id !== id);
        renderCart();
    }
</script>

</body>
</html>
